# pyproject-template.toml
#
# Starter pyproject.toml for a Python project following B12 Consulting best
# practices. Replace placeholder values before using:
#
#   YOUR-PROJECT-NAME  → actual project / distribution name (e.g. "my-service")
#   your_package_name  → importable package name       (e.g. "my_service")

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "YOUR-PROJECT-NAME"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = [
  "ruff>=0.4",
  "ty>=0.0.21",
  "bandit[toml]>=1.7",
  "pytest>=8.0",
  "pytest-mock>=3.14",
  "pytest-cov>=5.0",
]

# ---------------------------------------------------------------------------
# Ruff — formatter and linter
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "S",   # flake8-bandit (security)
  "ANN", # flake8-annotations (type hints)
]
ignore = [
  "ANN101", # Missing type annotation for `self`
  "ANN102", # Missing type annotation for `cls`
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN"]   # allow assert and unannotated test helpers

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src/your_package_name --cov-report=term-missing"

# ---------------------------------------------------------------------------
# bandit — security linter
# ---------------------------------------------------------------------------
[tool.bandit]
exclude_dirs = ["tests"]
skips = []
